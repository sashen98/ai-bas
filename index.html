<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI | Premium Chat Experience</title>
    <meta name="description" content="Experience a highly dynamic, beautifully animated AI chat interface.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Custom Cursor -->
    <div id="cursor-dot"></div>
    <div id="cursor-ring"></div>

    <!-- Animated Background -->
    <div class="bg-mesh">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    <!-- Auth Overlay -->
    <div id="auth-screen" class="auth-overlay">
        <div class="auth-box glass-panel">
            <h2 id="auth-title">Welcome to Nexus AI</h2>
            <p id="auth-subtitle">Login to access the premium chat experience.</p>
            
            <form id="auth-form">
                <input type="email" id="auth-email" placeholder="Email Address" required>
                <input type="password" id="auth-password" placeholder="Password" required>
                <button type="submit" class="glass-btn primary-btn auth-submit-btn" id="auth-btn">Login</button>
            </form>
            <p class="auth-switch">Don't have an account? <span id="switch-auth-mode">Sign up</span></p>
            <p id="auth-error" class="auth-error"></p>
        </div>
    </div>

    <!-- Main Layout -->
    <div class="app-container">
        
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand">
                <div class="logo"></div>
                <h1>Nexus AI</h1>
            </div>
            <button id="new-chat-btn" class="glass-btn primary-btn">+ New Chat</button>
            
            <div class="history" id="history-container">
                <p class="history-title">Recent Chats</p>
                <ul id="history-list">
                    <!-- History items will be injected here -->
                </ul>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area">
            <!-- Header -->
            <header class="chat-header glass-panel">
                <h2>Playground</h2>
                <div class="status">
                    <span class="status-dot"></span>
                    <span class="status-text">AI is Ready</span>
                </div>
            </header>

            <!-- Messages Stream -->
            <div class="messages-container" id="messages-container">
                <!-- Welcome block if empty -->
                <div class="welcome-screen" id="welcome-screen">
                    <h1>How can I help you today?</h1>
                    <p>Enter a prompt below and watch the magic unfold.</p>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-wrapper">
                <form id="chat-form" class="glass-panel prompt-form">
                    <button type="button" class="icon-btn attachment-btn" title="Add File">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                    </button>
                    <textarea id="prompt-input" placeholder="Type your message here..." rows="1" autofocus></textarea>
                    <button type="submit" id="send-btn" class="icon-btn send-btn" disabled>
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </form>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="script.js"></script>
</body>
</html>
