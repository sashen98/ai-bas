<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI | Premium Chat Experience</title>
    <meta name="description" content="Experience a highly dynamic, beautifully animated AI chat interface.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <!-- Custom Cursor -->
    <div id="cursor-dot"></div>
    <div id="cursor-ring"></div>

    <!-- Animated Background -->
    <div class="bg-mesh">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>


    <!-- Main Layout -->
    <div class="app-container">
        
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand">
                <div class="logo"></div>
                <h1>Nexus AI</h1>
            </div>
            <div class="sidebar-actions">
                <button id="new-chat-btn" class="glass-btn primary-btn">+ New Chat</button>
                <button id="new-folder-btn" class="glass-btn folder-btn" title="New Folder">📁</button>
            </div>

            <!-- Folders Section -->
            <div class="folders-section" id="folders-section">
                <p class="history-title">📂 Folders</p>
                <ul id="folder-list">
                    <!-- Folders injected here -->
                </ul>
            </div>

            <div class="history" id="history-container">
                <p class="history-title">Recent Chats</p>
                <ul id="history-list">
                    <!-- History items will be injected here -->
                </ul>
            </div>
            
            <!-- Remote Sync Settings -->
            <div class="api-key-container" style="margin-top:auto;">
                <p class="history-title">Local Sync (Ngrok)</p>
                <input type="text" id="remote-url-input" placeholder="https://..." style="width:100%;">
                <button id="save-remote-btn" class="glass-btn small-btn" style="width:100%; margin-top:5px;">Connect</button>
            </div>

            <!-- App Installation -->
            <div class="api-key-container">
                <p class="history-title">App Actions</p>
                <a href="NexusAI-Installer.zip" download="NexusAI-Installer.zip" class="glass-btn small-btn" style="width:100%; display:block; text-align:center; text-decoration:none; background: linear-gradient(135deg, #00e676, #00b0ff); color: #000; font-weight: bold; margin-bottom: 5px;">⬇️ Download App Installer</a>
            </div>

        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area">
            <!-- Header -->
            <header class="chat-header glass-panel">
                <h2>Playground</h2>
                <div class="header-actions">
                    <button id="save-computer-btn" class="glass-btn small-btn" title="Save chat to your computer">💾 Save to Computer</button>
                    <div class="status">
                        <span class="status-dot"></span>
                        <span class="status-text">AI is Ready</span>
                    </div>
                </div>
            </header>

            <!-- Messages Stream -->
            <div class="messages-container" id="messages-container">
                <!-- Welcome block if empty -->
                <div class="welcome-screen" id="welcome-screen">
                    <h1>How can I help you today?</h1>
                    <p>Enter a prompt below and watch the magic unfold.</p>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-wrapper">
                <form id="chat-form" class="glass-panel prompt-form">
                    <button type="button" class="icon-btn attachment-btn" title="Add File">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                    </button>
                    <textarea id="prompt-input" placeholder="Type your message here..." rows="1" autofocus></textarea>
                    <button type="submit" id="send-btn" class="icon-btn send-btn" disabled>
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </form>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="script.js"></script>
</body>
</html>
